<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Trang Bài Tập</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Arial;
            
            
            background-image: url("https://tse3.mm.bing.net/th/id/OIP.JOlilELJSfH3FKTdTUtfqAHaEK?pid=Api&P=0&h=180");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        
        .overlay {
            min-height: 100vh;
            background: rgba(0,0,0,0.5);
            padding-bottom: 30px;
        }

        .container-custom {
            width: 60%;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .baitap {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .baitap:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .left {
            display: flex;
            align-items: center;
        }

        .number {
            width: 35px;
            height: 35px;
            background: #007bff;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 35px;
            margin-right: 10px;
            font-weight: bold;
        }

        .action-box {
            background: #eaf2ff;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .navbar {
            margin-bottom: 0;
        }

        .back-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
        }
    </style>
</head>

<body>

<div class="overlay">

            <li><a href="https://anh201583-wq.github.io/Tranglienhe-html/">Liên Hệ</a></li>
        </ul>

    </div>
</nav>

<!-- NỘI DUNG -->
<div class="container-custom">
    <h1><b>Tổng Hợp Bài Tập Của Tuấn Anh</b></h1>

    <div class="baitap">
        <div class="left">
            <div class="number">1</div>
            <span>Bài 1: Thơ ngắn 2 câu</span>
        </div>
        <div class="action-box">
            <a href="https://anh201583-wq.github.io/web-html-baitap/" class="btn btn-primary">Xem</a>
        </div>
    </div>

    <div class="baitap">
